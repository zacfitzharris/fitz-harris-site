<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zac Fitz-Harris</title>
  <meta name="description" content="Zac Fitz-Harris — professional profile and contact links." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #090a0c;
      --text: #f4efe7;
      --muted: #a9a199;
      --line: rgba(255,255,255,0.12);
      --panel: rgba(255,255,255,0.055);
      --gold: #d2b16f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(210,177,111,0.13), transparent 30%),
        linear-gradient(135deg, #07080a 0%, #111318 58%, #07080a 100%);
    }

    .page {
      width: min(1160px, calc(100% - 48px));
      margin: 0 auto;
    }

    header {
      height: 92px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    nav {
      display: flex;
      gap: 28px;
      font-size: 0.9rem;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
    }

    nav a:hover {
      color: var(--text);
    }

    main {
      min-height: calc(100vh - 160px);
      display: grid;
      grid-template-columns: 1fr 0.88fr;
      gap: 72px;
      align-items: center;
      padding: 64px 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--muted);
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.035);
      padding: 9px 15px;
      border-radius: 999px;
      margin-bottom: 30px;
      font-size: 0.92rem;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
    }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(5.2rem, 10vw, 8.4rem);
      font-weight: 600;
      line-height: 0.82;
      letter-spacing: -0.055em;
      margin-bottom: 30px;
    }

    .intro {
      max-width: 480px;
      color: var(--muted);
      font-size: 1.2rem;
      line-height: 1.55;
      margin-bottom: 36px;
    }

    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .btn {
      min-height: 54px;
      padding: 0 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-weight: 650;
      transition: transform 0.18s ease, opacity 0.18s ease, border-color 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .primary {
      background: var(--gold);
      color: #111;
    }

    .secondary {
      color: var(--text);
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.035);
    }

    .secondary:hover {
      border-color: rgba(255,255,255,0.28);
    }

    .email {
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: 5px;
      font-size: 0.96rem;
    }

    .email:hover {
      color: var(--text);
    }

    .portrait {
      position: relative;
      padding: 18px;
      border-radius: 34px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 32px 90px rgba(0,0,0,0.42);
    }

    .portrait img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      display: block;
      border-radius: 24px;
    }

    .caption {
      position: absolute;
      left: 34px;
      right: 34px;
      bottom: 34px;
      padding: 18px 20px;
      border-radius: 20px;
      background: rgba(5,6,8,0.72);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(14px);
    }

    .caption strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 3px;
    }

    .caption span {
      color: var(--muted);
      font-size: 0.9rem;
    }

    footer {
      border-top: 1px solid var(--line);
      padding: 28px 0 38px;
      color: rgba(255,255,255,0.42);
      font-size: 0.88rem;
    }

    @media (max-width: 860px) {
      nav {
        display: none;
      }

      main {
        grid-template-columns: 1fr;
        gap: 44px;
        padding: 40px 0 64px;
      }

      h1 {
        font-size: clamp(4.6rem, 18vw, 6.8rem);
      }

      .portrait {
        max-width: 430px;
        margin: 0 auto;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <div class="brand">Zac Fitz-Harris</div>
      <nav>
        <a href="https://www.linkedin.com/in/zacfh" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a href="https://www.instagram.com/zac_kretzrealestate" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="mailto:zac@fitz-harris.com">Contact</a>
      </nav>
    </header>

    <main>
      <section>
        <div class="eyebrow"><span class="dot"></span> Brussels • Belgium</div>

        <h1>Zac<br>Fitz-Harris</h1>

        <p class="intro">Professional profile, contact, and selected links.</p>

        <div class="actions">
          <a class="btn primary" href="https://www.linkedin.com/in/zacfh" target="_blank" rel="noopener noreferrer">LinkedIn</a>
          <a class="btn secondary" href="https://www.instagram.com/zac_kretzrealestate" target="_blank" rel="noopener noreferrer">Instagram</a>
        </div>

        <a class="email" href="mailto:zac@fitz-harris.com">zac@fitz-harris.com</a>
      </section>

      <aside class="portrait">
        <img src="avatar.jpg" alt="Zac Fitz-Harris">
        <div class="caption">
          <strong>Zac Fitz-Harris</strong>
          <span>Professional profile</span>
        </div>
      </aside>
    </main>

    <footer>© <span id="year"></span> Zac Fitz-Harris</footer>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
